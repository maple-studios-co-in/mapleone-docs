<svg width="1480" height="1010" viewBox="0 0 1480 1010" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8f1f2b"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect width="1480" height="1010" fill="#faf6ee"/>

  <!-- title band -->
  <rect x="0" y="0" width="1480" height="74" fill="#8f1f2b"/>
  <text x="40" y="40" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="#ffffff">MapleOne — Architecture</text>
  <text x="40" y="62" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#f3e3c3">One suite · one login · one tenant model — sold under the customer's brand</text>
  <text x="1440" y="46" text-anchor="end" font-size="12" fill="#f3e3c3">Maple Studios · July 2026</text>

  <!-- ===== USERS ROW ===== -->
  <text x="40" y="106" font-size="12" font-weight="bold" fill="#8f1f2b" letter-spacing="2">WHO USES IT</text>
  <g>
    <rect x="40" y="116" width="440" height="56" rx="8" fill="#ffffff" stroke="#e7e0d6"/>
    <text x="60" y="140" font-size="14" font-weight="bold" fill="#1c1917">Maple Furnishers team</text>
    <text x="60" y="158" font-size="11.5" fill="#6b6560">customer zero — every module proven on real work first</text>

    <rect x="512" y="116" width="440" height="56" rx="8" fill="#ffffff" stroke="#e7e0d6"/>
    <text x="532" y="140" font-size="14" font-weight="bold" fill="#1c1917">White-label customers' teams</text>
    <text x="532" y="158" font-size="11.5" fill="#6b6560">dealers · interior designers · modular-kitchen brands</text>

    <rect x="984" y="116" width="456" height="56" rx="8" fill="#ffffff" stroke="#e7e0d6"/>
    <text x="1004" y="140" font-size="14" font-weight="bold" fill="#1c1917">Their end clients</text>
    <text x="1004" y="158" font-size="11.5" fill="#6b6560">no login — branded PDF proposals · public shoot galleries</text>
  </g>

  <!-- domain strip -->
  <rect x="40" y="190" width="1400" height="40" rx="8" fill="#f0e7d8"/>
  <text x="60" y="215" font-size="12.5" fill="#6f1620" font-weight="bold">Entry by domain:</text>
  <text x="185" y="215" font-size="12.5" fill="#1c1917">one.maplefurnishers.com (ours)</text>
  <text x="450" y="215" font-size="12.5" fill="#1c1917">·&#160;&#160;tools.customerbrand.com (white-label — same code, their Tenant row decides logo, colors, company details)</text>

  <line x1="260" y1="172" x2="260" y2="190" stroke="#8f1f2b" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="732" y1="172" x2="732" y2="190" stroke="#8f1f2b" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="1212" y1="172" x2="1212" y2="190" stroke="#8f1f2b" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="740" y1="230" x2="740" y2="252" stroke="#8f1f2b" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- ===== THE SUITE ===== -->
  <rect x="40" y="252" width="1400" height="430" rx="12" fill="#ffffff" stroke="#8f1f2b" stroke-width="2"/>
  <rect x="40" y="252" width="1400" height="44" rx="12" fill="#8f1f2b"/>
  <rect x="40" y="284" width="1400" height="12" fill="#8f1f2b"/>
  <text x="60" y="280" font-family="Georgia, serif" font-size="19" font-weight="bold" fill="#ffffff">MAPLEONE SUITE</text>
  <text x="1420" y="280" text-anchor="end" font-size="12.5" fill="#f3e3c3">every module: same login · same client records · same brand rails</text>

  <!-- flagship column -->
  <text x="64" y="326" font-size="11.5" font-weight="bold" fill="#8f1f2b" letter-spacing="2">FIRST CUSTOMER-GRADE MODULES — every module reaches this bar</text>

  <rect x="64" y="338" width="400" height="130" rx="10" fill="#f7f1e6" stroke="#8f1f2b" stroke-width="1.5"/>
  <text x="84" y="366" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#6f1620">Quotations</text>
  <text x="84" y="390" font-size="12.5" fill="#1c1917">AI catalog parsing — reads scanned, handwritten rate sheets</text>
  <text x="84" y="410" font-size="12.5" fill="#1c1917">Product library (MF-P codes) + shared image gallery</text>
  <text x="84" y="430" font-size="12.5" fill="#1c1917">Branded PDF proposals · rate-sheet exports · GST math</text>
  <text x="84" y="454" font-size="11" fill="#6b6560" font-style="italic">status: extracted, audited, production-ready — folds back in</text>

  <rect x="64" y="484" width="400" height="130" rx="10" fill="#f7f1e6" stroke="#8f1f2b" stroke-width="1.5"/>
  <text x="84" y="512" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#6f1620">Photoshoot</text>
  <text x="84" y="536" font-size="12.5" fill="#1c1917">AI generation wizard — MapleLens engine inside the suite</text>
  <text x="84" y="556" font-size="12.5" fill="#1c1917">Client-facing shoot galleries (public share links) · video</text>
  <text x="84" y="576" font-size="12.5" fill="#1c1917">Feeds product photos into the shared gallery</text>
  <text x="84" y="600" font-size="11" fill="#6b6560" font-style="italic">status: extraction in progress — align to suite standard</text>

  <!-- operations grid -->
  <text x="512" y="326" font-size="11.5" font-weight="bold" fill="#8f1f2b" letter-spacing="2">OPERATIONS MODULES (the daily-work ladder)</text>
  <g font-size="12.5" fill="#1c1917">
    <rect x="512" y="338" width="130" height="40" rx="7" fill="#ffffff" stroke="#e7e0d6"/><text x="577" y="363" text-anchor="middle">Leads</text>
    <rect x="654" y="338" width="130" height="40" rx="7" fill="#ffffff" stroke="#e7e0d6"/><text x="719" y="363" text-anchor="middle">CRM / Clients</text>
    <rect x="796" y="338" width="130" height="40" rx="7" fill="#ffffff" stroke="#e7e0d6"/><text x="861" y="363" text-anchor="middle">Orders</text>
    <rect x="938" y="338" width="130" height="40" rx="7" fill="#ffffff" stroke="#e7e0d6"/><text x="1003" y="363" text-anchor="middle">Invoices</text>
    <rect x="1080" y="338" width="130" height="40" rx="7" fill="#ffffff" stroke="#e7e0d6"/><text x="1145" y="363" text-anchor="middle">Challans</text>
    <rect x="1222" y="338" width="130" height="40" rx="7" fill="#ffffff" stroke="#e7e0d6"/><text x="1287" y="363" text-anchor="middle">Payments</text>

    <rect x="512" y="390" width="130" height="40" rx="7" fill="#ffffff" stroke="#e7e0d6"/><text x="577" y="415" text-anchor="middle">Inventory</text>
    <rect x="654" y="390" width="130" height="40" rx="7" fill="#ffffff" stroke="#e7e0d6"/><text x="719" y="415" text-anchor="middle">Purchase Orders</text>
    <rect x="796" y="390" width="130" height="40" rx="7" fill="#ffffff" stroke="#e7e0d6"/><text x="861" y="415" text-anchor="middle">Finance</text>
    <rect x="938" y="390" width="130" height="40" rx="7" fill="#ffffff" stroke="#e7e0d6"/><text x="1003" y="415" text-anchor="middle">Expenses</text>
    <rect x="1080" y="390" width="130" height="40" rx="7" fill="#ffffff" stroke="#e7e0d6"/><text x="1145" y="415" text-anchor="middle">HR</text>
    <rect x="1222" y="390" width="130" height="40" rx="7" fill="#ffffff" stroke="#e7e0d6"/><text x="1287" y="415" text-anchor="middle">Tasks</text>

    <rect x="512" y="442" width="130" height="40" rx="7" fill="#ffffff" stroke="#e7e0d6"/><text x="577" y="467" text-anchor="middle">Catalog</text>
    <rect x="654" y="442" width="130" height="40" rx="7" fill="#ffffff" stroke="#e7e0d6"/><text x="719" y="467" text-anchor="middle">Docs</text>
    <rect x="796" y="442" width="130" height="40" rx="7" fill="#ffffff" stroke="#e7e0d6"/><text x="861" y="467" text-anchor="middle">Team &amp; access</text>
  </g>
  <text x="512" y="510" font-size="12" fill="#6b6560" font-style="italic">Modules light up per customer plan — a dealer may start with Quotations + Photoshoot,</text>
  <text x="512" y="528" font-size="12" fill="#6b6560" font-style="italic">then add Orders and Invoices when the quote wins. Same suite, feature-flagged.</text>

  <!-- module flow arrows -->
  <g stroke="#8f1f2b" stroke-width="1.4" fill="none">
    <path d="M 642 358 L 654 358" marker-end="url(#arr)"/>
    <path d="M 784 358 L 796 358" marker-end="url(#arr)"/>
    <path d="M 926 358 L 938 358" marker-end="url(#arr)"/>
    <path d="M 1068 358 L 1080 358" marker-end="url(#arr)"/>
    <path d="M 1210 358 L 1222 358" marker-end="url(#arr)"/>
  </g>
  <text x="1000" y="510" font-size="12" fill="#6f1620" font-weight="bold">quote → order → invoice → payment:</text>
  <text x="1000" y="528" font-size="12" fill="#6b6560" font-style="italic">module events already seamed into Quotations</text>

  <!-- platform rails -->
  <rect x="64" y="628" width="1352" height="38" rx="8" fill="#6f1620"/>
  <text x="84" y="652" font-size="12.5" font-weight="bold" fill="#ffffff">PLATFORM RAILS</text>
  <text x="230" y="652" font-size="12.5" fill="#f3e3c3">MapleID SSO (one JWT everywhere)&#160;&#160;·&#160;&#160;Tenant branding = white-label&#160;&#160;·&#160;&#160;RBAC roles &amp; permissions&#160;&#160;·&#160;&#160;shared product library + gallery&#160;&#160;·&#160;&#160;feature flags per plan&#160;&#160;·&#160;&#160;module events</text>

  <!-- ===== LENS SATELLITE ===== -->
  <rect x="40" y="712" width="400" height="88" rx="10" fill="#ffffff" stroke="#8f1f2b" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="60" y="740" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#6f1620">MapleLens <tspan font-family="Helvetica" font-size="11" font-style="italic" fill="#6b6560">— consumer brand, separate front door</tspan></text>
  <text x="60" y="762" font-size="12" fill="#1c1917">Phone photo in → studio shot out · 14 Indian-context presets</text>
  <text x="60" y="782" font-size="12" fill="#6b6560">Free tier = lead funnel; its engine powers the Photoshoot module</text>
  <path d="M 264 712 C 264 690, 264 690, 264 682" stroke="#8f1f2b" stroke-width="1.6" fill="none" marker-end="url(#arr)" transform="translate(0,0)"/>
  <text x="276" y="700" font-size="11" fill="#8f1f2b" font-style="italic">same AI engine + signups feed the suite</text>

  <!-- ===== SHARED FOUNDATION ===== -->
  <text x="472" y="734" font-size="11.5" font-weight="bold" fill="#8f1f2b" letter-spacing="2">SHARED FOUNDATION</text>
  <g font-size="12" fill="#1c1917">
    <rect x="472" y="744" width="228" height="56" rx="8" fill="#ffffff" stroke="#e7e0d6"/>
    <text x="488" y="766" font-weight="bold">@maple/core</text>
    <text x="488" y="784" fill="#6b6560">UI kit · auth · RBAC · tenant</text>

    <rect x="712" y="744" width="228" height="56" rx="8" fill="#ffffff" stroke="#e7e0d6"/>
    <text x="728" y="766" font-weight="bold">@maple/db</text>
    <text x="728" y="784" fill="#6b6560">one Prisma schema, tenant-scoped</text>

    <rect x="952" y="744" width="238" height="56" rx="8" fill="#ffffff" stroke="#e7e0d6"/>
    <text x="968" y="766" font-weight="bold">AI layer</text>
    <text x="968" y="784" fill="#6b6560">Claude doc parsing · Lens image gen</text>

    <rect x="1202" y="744" width="238" height="56" rx="8" fill="#ffffff" stroke="#e7e0d6"/>
    <text x="1218" y="766" font-weight="bold">Documents &amp; exports</text>
    <text x="1218" y="784" fill="#6b6560">branded PDFs · rate sheets (xlsx)</text>
  </g>

  <!-- ===== DATA + DEPLOY ===== -->
  <g font-size="12" fill="#1c1917">
    <rect x="40" y="828" width="688" height="70" rx="10" fill="#f0e7d8"/>
    <text x="60" y="854" font-weight="bold" fill="#6f1620">DATA</text>
    <text x="120" y="854">Postgres — clients, quotes, orders, products, shoots, assets (all tenant-stamped)</text>
    <text x="120" y="876" fill="#6b6560">object storage for images when the fleet grows · nightly backups + restore drill</text>

    <rect x="752" y="828" width="688" height="70" rx="10" fill="#f0e7d8"/>
    <text x="772" y="854" font-weight="bold" fill="#6f1620">DEPLOY</text>
    <text x="848" y="854">Docker Compose on AWS · Caddy TLS · two modes, same code:</text>
    <text x="848" y="876" fill="#6b6560">① our multi-tenant install (maplefurnishers.com)&#160;&#160;② instance-per-customer (white-label)</text>
  </g>

  <line x1="384" y1="682" x2="384" y2="828" stroke="#e7e0d6" stroke-width="0"/>
  <path d="M 740 682 L 740 706" stroke="#8f1f2b" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
  <path d="M 740 806 L 740 828" stroke="#8f1f2b" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>

  <!-- footer strip -->
  <rect x="0" y="938" width="1480" height="72" fill="#6f1620"/>
  <text x="40" y="968" font-size="13" font-weight="bold" fill="#ffffff">The pitch in one sentence:</text>
  <text x="40" y="990" font-size="13" fill="#f3e3c3">a dealer signs up, uploads their logo once, and every quote, gallery and invoice their clients ever see carries THEIR brand — powered by the suite we run our own business on.</text>
</svg>
